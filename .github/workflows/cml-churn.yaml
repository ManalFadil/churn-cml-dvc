name: churn-imbalanced-dataset

on: [push]
permissions: write-all

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout
      - uses: actions/checkout@v3

      # 2. Setup Python
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # 3. Setup Node (pour CML)
      - uses: actions/setup-node@v3
        with:
          node-version: "16"

      # 4. Setup CML
      - uses: iterative/setup-cml@v1

      # 5. Installer dépendances et DVC
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc[s3]

      # 7. Télécharger les données depuis DVC
      - name: Pull data with DVC
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: dvc pull

      # 8. Exécuter le script Python
      - name: Run script
        run: python script.py
        
      - name: Generate Report
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |

          # Get the report
          echo "## Metrics" > report.md
          cat metrics.txt >> report.md

          awk 'NR%4{print "    " $0}{print ""}' metrics.txt >> report.md

          echo "## Confusion Matrix" >> report.md
          echo "![](./conf_matrix.png)" >> report.md
          cml comment create report.md
