name: churn-imbalanced-dataset

on:
  push:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout du repo
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2️⃣ Setup Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # 3️⃣ Setup CML
      - name: Set up CML
        uses: iterative/setup-cml@v2

      # 4️⃣ Installation des dépendances
      - name: Install Python deps
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "dvc[s3]==3.63.0"

      # 5️⃣ Récupération des données/modèles depuis S3
      - name: DVC pull (restore data/models from S3)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          dvc pull || echo "No remote cache yet"

      # 6️⃣ Entrainement + versioning + push
      - name: Train / Eval / Push artifacts
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          # 1. Entrainement du modèle
          python script.py

          # script.py doit produire :
          # - metrics.txt
          # - conf_matrix.png
          # - dossiers data/ et models/ mis à jour

          # 2. Versionner les outputs
          dvc add data models

          # 3. Commit des fichiers DVC
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git add data.dvc models.dvc || true
          [ -f dvc.lock ] && git add dvc.lock

          git commit -m "Update data/models [skip ci]" || echo "Nothing to commit"

          # 4. Push vers S3
          dvc push
          
      - name: Debug dataset path
        run: |
          echo "Listing project structure"
          ls -R data || echo "data folder missing"

      # 7️⃣ Publication du rapport CML
      - name: Publish CML report
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## Metrics" > report.md
          awk 'NR %4{ print " " $0 }{ print ""}' metrics.txt >> report.md

          echo "## Confusion Matrix" >> report.md
          echo "![](./conf_matrix.png)" >> report.md

          # Commentaire automatique
          cml comment create report.md